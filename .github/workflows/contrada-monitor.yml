name: Contrada Lessinia — Monitor sito e email

on:
  schedule:
    # Ogni giorno alle 5:00 UTC (7:00 ora italiana)
    - cron: "0 5 * * *"
  workflow_dispatch: # Esecuzione manuale

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Esegui monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/contrada/monitor.py
